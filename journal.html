<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Pro Forex Journal | Track Your Trades</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* --- YOUR EXISTING STYLES (COPY FROM YOUR CURRENT journal.html) --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0a0e27; color: #ffffff; padding: 16px; padding-bottom: 80px; }
        .container { max-width: 1400px; margin: 0 auto; }
        /* ... (keep all your existing CSS classes: .header, .stats-dashboard, etc.) ... */
        .upgrade-banner { background: linear-gradient(135deg, #ff6b6b, #ee5a24); border-radius: 20px; padding: 16px; text-align: center; margin-bottom: 20px; display: none; }
        .upgrade-banner.show { display: block; }
        /* ... rest of your styles ... */
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📊 Pro Forex Journal</h1>
        <p>Track. Analyze. Improve. Everything a trader needs.</p>
        <div class="free-badge" id="freeBadge">🎯 25 FREE TRADES REMAINING</div>
    </div>

    <div class="upgrade-banner" id="upgradeBanner">
        <h3>🔒 Free Trial Limit Reached</h3>
        <p>You have used your 25 free trades. Upgrade to unlimited for ₦2,000 one-time.</p>
        <button class="upgrade-btn" onclick="showUpgradeInfo()">Upgrade Now →</button>
    </div>

    <!-- --- THE REST OF YOUR JOURNAL UI (STATS, CHARTS, FORM, TABLE) --- -->
    <!-- ... keep all your existing HTML structure: .stats-dashboard, .charts-grid, etc. ... -->

</div>

<script>
    // --- CONFIGURATION ---
    const PRICE = 2000; // Updated price
    const WHATSAPP_NUMBER = '2348032958122';
    const OPAY_NUMBER = '8112401459';
    const OPAY_NAME = 'Segun Martin Michael';
    const SHEETDB_API_URL = 'https://sheetdb.io/api/v1/eizek3qs2z56o'; // Your main API URL

    // --- UNLOCK LOGIC ---
    let isUnlimited = localStorage.getItem('proForexUnlimited') === 'true';
    let trades = JSON.parse(localStorage.getItem('proForexJournal')) || [];
    let freeTradesLimit = 25;

    function showUpgradeInfo() {
        const message = `💳 Payment Information:\n\n` +
                        `Send ₦${PRICE.toLocaleString()} to:\n` +
                        `Opay: ${OPAY_NUMBER}\n` +
                        `Name: ${OPAY_NAME}\n\n` +
                        `After payment, click "I have paid" to receive your unique unlock code.`;
        alert(message);
        
        // Ask if they have paid
        if (confirm("Have you made the payment and received your unlock code?")) {
            unlockFullVersion();
        }
    }

    async function unlockFullVersion() {
        const userCode = prompt("Enter your unlock code:");
        if (!userCode) return;

        // Show loading state
        const upgradeBanner = document.getElementById('upgradeBanner');
        const originalContent = upgradeBanner.innerHTML;
        upgradeBanner.innerHTML = '<p>Verifying code...</p>';

        try {
            // 1. Fetch all codes from SheetDB
            const response = await fetch(`${SHEETDB_API_URL}/codes`);
            const codes = await response.json();
            
            // 2. Find the matching code that is not used
            const validCode = codes.find(c => c.code === userCode && c.used !== 'TRUE');
            
            if (validCode) {
                // 3. Mark the code as used in SheetDB
                const updateResponse = await fetch(`${SHEETDB_API_URL}/codes/${validCode.id}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ used: 'TRUE' })
                });
                
                if (updateResponse.ok) {
                    localStorage.setItem('proForexUnlimited', 'true');
                    isUnlimited = true;
                    alert("✅ Unlimited access activated! Refresh the page.");
                    location.reload();
                } else {
                    throw new Error('Failed to update code status');
                }
            } else {
                alert("❌ Invalid or already used code. Please contact support on WhatsApp.");
            }
        } catch (error) {
            console.error('Verification error:', error);
            alert("❌ Could not verify code. Please check your internet and try again, or contact support on WhatsApp.");
        } finally {
            upgradeBanner.innerHTML = originalContent;
        }
    }

    // --- YOUR EXISTING JOURNAL FUNCTIONS (addTrade, renderTrades, etc.) ---
    // ... (keep all your existing JavaScript functions here) ...

    // --- MODIFY addTrade TO CHECK UNLIMITED STATUS ---
    function addTrade() {
        if (!isUnlimited && trades.length >= freeTradesLimit) {
            showUpgradeInfo();
            return;
        }
        // ... rest of your addTrade logic ...
    }

    // --- MODIFY updateStatsAndCharts TO HIDE UPGRADE BANNER WHEN UNLIMITED ---
    function updateStatsAndCharts() {
        // ... your existing stats calculation ...
        
        // Update UI based on unlimited status
        if (isUnlimited) {
            document.getElementById('upgradeBanner').classList.remove('show');
            document.getElementById('freeBadge').innerHTML = '🎯 UNLIMITED ACCESS';
            document.getElementById('tradesLeft').innerText = '∞';
        } else {
            const tradesLeft = freeTradesLimit - trades.length;
            document.getElementById('upgradeBanner').classList.toggle('show', tradesLeft <= 0);
            document.getElementById('freeBadge').innerHTML = `🎯 ${tradesLeft} FREE TRADES REMAINING`;
            document.getElementById('tradesLeft').innerText = Math.max(0, tradesLeft);
        }
        // ... rest of your stats display ...
    }

    // Initial render
    renderTrades();
</script>
</body>
</html>
